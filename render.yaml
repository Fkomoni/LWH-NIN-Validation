# Render blueprint for the LWH NIN Update/Verification portal.
#
# All PII / counter state that used to live in the in-memory KV now
# flows through Upstash Redis (primary) when the two UPSTASH_* env
# vars are set; otherwise it falls back to the in-process Map. Live
# production refuses to boot without a durable KV configured (see
# src/server/startupCheck.ts).

services:
  - type: web
    name: lwh-nin-validation
    runtime: node
    plan: starter
    region: oregon
    branch: claude/nin-verification-system-iyLLh
    autoDeploy: true
    buildCommand: pnpm install --frozen-lockfile && pnpm exec prisma generate && pnpm build
    startCommand: pnpm start -p $PORT
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_MOCKS_ENABLED
        value: "false"

      # ── App-level secrets ──────────────────────────────────────────
      - key: AUTH_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: OTP_HMAC_SECRET
        generateValue: true

      # Dev-only plaintext password — ignored in production.
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      # scrypt-encoded bootstrap credential, REQUIRED in production.
      # Format: scrypt$<Nlog2>$<saltB64>$<keyB64>. Generate with
      #   node -e "import('./src/lib/secrets').then(m => console.log(m.hashAdminPassword('pw')))"
      - key: ADMIN_BOOTSTRAP_PASSWORD_HASH
        sync: false
      # Comma-separated list of admin emails permitted to sign in with
      # the bootstrap password. REQUIRED in live production.
      - key: ADMIN_ALLOWED_EMAILS
        sync: false
      # Comma-separated absolute origins permitted to call mutating
      # server actions (authStart, adminLogin, etc.). REQUIRED in
      # live production; assertSameOrigin() fails closed when unset.
      # Example: https://portal.leadwayhealth.com
      - key: ALLOWED_ORIGINS
        sync: false

      # ── Durable KV (Upstash Redis via REST) ────────────────────────
      # REQUIRED in live production (or DATABASE_URL below). Without
      # either, startupCheck throws at boot.
      # Provision at https://upstash.com → Create Database → Redis,
      # region closest to "oregon", type Regional, eviction allkeys-lru.
      # Then paste the REST URL + token here.
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

      # ── Database (Prisma / audit persistence) ──────────────────────
      # OPTIONAL unless AUDIT_DB_ENABLED=true. When you want persistent
      # audit events, uncomment the `databases` block at the bottom of
      # this file so Render provisions Postgres and auto-wires
      # DATABASE_URL; alternatively point to an external Postgres URL
      # by setting DATABASE_URL manually (sync: false).
      - key: DATABASE_URL
        sync: false
      - key: AUDIT_DB_ENABLED
        value: "false"

      # ── Qore (NIMC) ────────────────────────────────────────────────
      - key: QORE_TOKEN_URL
        sync: false
      - key: QORE_NIN_VERIFY_URL
        sync: false
      - key: QORE_CLIENT_ID
        sync: false
      - key: QORE_SECRET_KEY
        sync: false

      # ── Prognosis ──────────────────────────────────────────────────
      - key: PROGNOSIS_BASE_URL
        value: https://prognosis-api.leadwayhealth.com/api
      - key: PROGNOSIS_USERNAME
        sync: false
      - key: PROGNOSIS_PASSWORD
        sync: false
      # Optional — only if Leadway provisions a SEPARATE static key
      # on a header distinct from Authorization.
      - key: PROGNOSIS_API_KEY
        sync: false
      - key: PROGNOSIS_API_KEY_HEADER
        sync: false

      # ── Bot protection (Cloudflare Turnstile) ──────────────────────
      # verifyTurnstile() fails closed in production when
      # TURNSTILE_SECRET_KEY is unset. The site key ships to the
      # browser via NEXT_PUBLIC_* so the widget can render.
      - key: NEXT_PUBLIC_TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false

      # ── Observability ──────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false
      - key: LOG_LEVEL
        value: info

      # ── Deployment flags ───────────────────────────────────────────
      # Only enable when the reverse proxy does NOT set x-real-ip but
      # DOES append a trusted last hop to X-Forwarded-For (and strips
      # attacker-supplied tail values). Render typically sets
      # x-real-ip, so leave this empty unless you know you need it.
      - key: TRUST_XFF_LAST_HOP
        sync: false

# Uncomment to let Render provision Postgres and auto-wire DATABASE_URL
# into the web service above. Keep commented if you're using an
# external Postgres (set DATABASE_URL manually in the dashboard).
#
# databases:
#   - name: lwh-nin-validation-db
#     plan: starter
#     region: oregon
#     databaseName: lwh_nin_validation
#     user: lwh_app
